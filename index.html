<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f0f1a">
  <title>Territory War</title>
  
  <!-- Telegram SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  
  <!-- Стили -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Экран загрузки -->
  <div id="loading-screen">
    <div class="loader">
      <div class="spinner"></div>
      <h2>Загрузка...</h2>
      <p id="loading-text">Подготовка</p>
    </div>
  </div>

  <!-- Контейнер игры -->
  <div id="game-container">
    <!-- 3D Canvas -->
    <canvas id="game-canvas"></canvas>
    
    <!-- UI Слой -->
    <div id="ui-layer">
      <!-- Верхняя панель -->
      <div id="top-bar" class="ui-panel hidden">
        <div class="stats">
          <div class="stat">🏰 <span id="territories-count">0</span></div>
          <div class="stat">⚔️ <span id="troops-count">0</span></div>
          <div class="stat">📍 <span id="turn-count">1</span></div>
        </div>
        <button id="end-turn-btn" class="btn btn-primary">✅ Ход</button>
      </div>
      
      <!-- Панель атаки -->
      <div id="attack-panel" class="ui-panel hidden">
        <h3>⚔️ Атака</h3>
        <p>Цель: <span id="target-tile">-</span></p>
        <div class="slider-container">
          <label>Войск: <span id="troops-value">10</span></label>
          <input type="range" id="troops-slider" min="1" max="100" value="10">
        </div>
        <div class="btn-row">
          <button id="attack-btn" class="btn btn-danger">🗡️ АТАКА</button>
          <button id="cancel-attack-btn" class="btn btn-secondary">❌</button>
        </div>
      </div>
      
      <!-- Сообщения -->
      <div id="message-box" class="ui-panel hidden">
        <p id="message-text"></p>
      </div>
      
      <!-- Экран конца игры -->
      <div id="game-over-screen" class="ui-panel hidden">
        <h2 id="game-over-title">🏆 Победа!</h2>
        <p id="game-over-message"></p>
        <button id="restart-btn" class="btn btn-primary">🔄 Заново</button>
      </div>
      
      <!-- Подсказка -->
      <div id="controls-hint" class="hint hidden">
        👆 Тап - выбор | ✌️ Зум | 🖐️ Свайп - камера
      </div>
    </div>
    
    <!-- Главное меню -->
    <div id="main-menu" class="menu-screen">
      <div class="menu-content">
        <h1>🌍 Territory War</h1>
        <p class="subtitle">Захвати все территории!</p>
        
        <div class="setting">
          <h3>Размер карты:</h3>
          <div class="btn-group">
            <button class="option-btn active" data-option="size" data-value="small">8×8</button>
            <button class="option-btn" data-option="size" data-value="medium">12×12</button>
            <button class="option-btn" data-option="size" data-value="large">16×16</button>
          </div>
        </div>
        
        <div class="setting">
          <h3>Боты:</h3>
          <div class="btn-group">
            <button class="option-btn active" data-option="bots" data-value="2">2</button>
            <button class="option-btn" data-option="bots" data-value="3">3</button>
            <button class="option-btn" data-option="bots" data-value="4">4</button>
          </div>
        </div>
        
        <div class="setting">
          <h3>Сложность:</h3>
          <div class="btn-group">
            <button class="option-btn active" data-option="diff" data-value="easy">Легко</button>
            <button class="option-btn" data-option="diff" data-value="medium">Средне</button>
            <button class="option-btn" data-option="diff" data-value="hard">Сложно</button>
          </div>
        </div>
        
        <button id="start-game-btn" class="btn btn-primary btn-large">🎮 Начать игру</button>
      </div>
    </div>
  </div>
  
  <!-- Скрипты игры -->
  <script src="js/sound.js"></script>
  <script src="js/store.js"></script>
  <script src="js/map.js"></script>
  <script src="js/tiles.js"></script>
  <script src="js/combat.js"></script>
  <script src="js/bot.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
